function renderTaskEl(t){
  const proj=projects.find(p=>String(p.id)===String(t.projId));
  const color=proj?proj.color:'#888';
  const isDone=t.done===true||String(t.done)==='true';
  const tc=getTagColor(t.tagColor||'none');
  const isDark=tc.id==='black';
  // For editors: check if they own this task's project
  const taskProj=projects.find(p=>String(p.id)===String(t.projId));
  const editorCanEdit=currentRole==='editor'&&taskProj&&(taskProj.owner||'')===currentUser;
  const isReadOnly=currentRole==='viewer'||(currentRole==='editor'&&!editorCanEdit);
  const el=document.createElement('div');
  el.className='task-item';
  el.draggable=!isReadOnly;
  el.style.background=tc.bg;
  el.style.borderLeftColor=tc.border;
  if(isDark) el.style.color='#fff';
  if(isReadOnly&&currentRole==='editor') el.style.opacity='.6';
  el.ondragstart=e=>{
    if(isReadOnly){e.preventDefault();return;}
    e.dataTransfer.setData('text/plain',String(t.id));
  };

  const textDiv=document.createElement('div');
  textDiv.className='task-text'+(isDone?' done':'');
  textDiv.textContent=t.text;
  textDiv.title='雙擊修改名稱';
  textDiv.style.cssText='flex:1;font-size:12px;line-height:1.4;cursor:text;min-width:0;word-break:break-word'+(isDark?';color:#fff':'')+(isDone?';color:'+(isDark?'rgba(255,255,255,.45)':'#aaa'):'');
  textDiv.ondblclick=e=>{
    e.stopPropagation();
    el.draggable=false;
    const input=document.createElement('input');
    input.value=t.text;
    input.style.cssText='flex:1;font-size:12px;border:none;border-bottom:1.5px solid '+(isDark?'#fff':'#378ADD')+';outline:none;background:transparent;width:100%;font-family:inherit;color:'+(isDark?'#fff':'inherit')+';padding:0';
    textDiv.replaceWith(input);
    input.focus();input.select();
    const commit=async()=>{
      const newText=input.value.trim();
      el.draggable=true;
      if(!newText||newText===t.text){renderDaily();return;}
      const prev=t.text;
      t.text=newText;
      renderDaily();
      const res=await api('updateTask',{id:String(t.id),text:newText});
      if(!res||res.error){t.text=prev;renderDaily();showToast('❌ 更新失敗，請重試');}
      else{showToast('✓ 任務名稱已更新');}
    };
    input.onblur=commit;
    input.onkeydown=e2=>{
      if(e2.key==='Enter'){e2.preventDefault();input.blur();}
      if(e2.key==='Escape'){el.draggable=true;t.text=t.text;renderDaily();}
    };
  };

  const checkDiv=document.createElement('div');
  checkDiv.className='task-check'+(isDone?' done':'');
  if(isDone){checkDiv.style.cssText='background:'+color+';border-color:'+color;}
  else if(isDark){checkDiv.style.borderColor='rgba(255,255,255,.5)';}
  checkDiv.onclick=()=>toggleTask(String(t.id));
  if(isDone){
    const icon=document.createElement('i');
    icon.className='ti ti-check';icon.setAttribute('aria-hidden','true');
    icon.style.cssText='font-size:8px;color:#fff';
    checkDiv.appendChild(icon);
  }

  const metaWrap=document.createElement('div');
  metaWrap.style.cssText='flex:1;min-width:0;display:flex;flex-direction:column;gap:1px';
  metaWrap.appendChild(textDiv);
  if(proj){
    const projLabel=document.createElement('div');
    projLabel.className='task-proj';
    projLabel.style.color=isDark?'rgba(255,255,255,.65)':color;
    projLabel.textContent='● '+proj.name;
    metaWrap.appendChild(projLabel);
  }
  if(t.repeat&&t.repeat!=='none'){
    const repBadge=document.createElement('div');
    const repLabels={weekly:'每週重複',monthly:'每月重複',custom:'自訂重複'};
    repBadge.style.cssText='font-size:9px;color:'+(isDark?'rgba(255,255,255,.65)':'#378ADD')+';margin-top:1px';
    repBadge.innerHTML='<i class="ti ti-repeat" style="font-size:9px"></i> '+(repLabels[t.repeat]||t.repeat);
    metaWrap.appendChild(repBadge);
  }

  const actionsDiv=document.createElement('div');
  actionsDiv.className='task-actions';
  actionsDiv.style.position='relative';
  if(isReadOnly) { el.appendChild(checkDiv); el.appendChild(metaWrap); el.appendChild(actionsDiv); return el; }
  const btnColor=isDark?'rgba(255,255,255,.7)':'#aaa';
  const btnHoverBg=isDark?'rgba(255,255,255,.15)':'#eee';
  actionsDiv.innerHTML=`
    <button class="task-action-btn" title="重複設定" onclick="openRepeatModal('${t.id}')" style="color:${t.repeat&&t.repeat!=='none'?(isDark?'#7dd3fc':'#378ADD'):btnColor}"><i class="ti ti-repeat" aria-hidden="true"></i></button>
    <button class="task-action-btn" title="標籤顏色" onclick="openTagPicker('${t.id}',this)" style="color:${isDark?'rgba(255,255,255,.8)':tc.id==='none'?'#aaa':tc.border}"><i class="ti ti-palette" aria-hidden="true"></i></button>
    <button class="task-action-btn" title="修改名稱" onclick="startRenameTask('${t.id}',this)" style="color:${btnColor}"><i class="ti ti-edit" aria-hidden="true"></i></button>
    <button class="task-action-btn" title="移動" onclick="moveTask('${t.id}')" style="color:${btnColor}"><i class="ti ti-arrows-move" aria-hidden="true"></i></button>
    <button class="task-action-btn" title="刪除" onclick="deleteTask('${t.id}')" style="color:${isDark?'#ff8080':'#E24B4A'}"><i class="ti ti-trash" aria-hidden="true"></i></button>`;

  el.appendChild(checkDiv);
  el.appendChild(metaWrap);
  el.appendChild(actionsDiv);
  return el;
}

function openTagPicker(taskId, btn){
  document.querySelectorAll('.tag-picker-popup').forEach(p=>p.remove());
  const t=tasks.find(x=>String(x.id)===String(taskId));if(!t)return;

  const popup=document.createElement('div');
  popup.className='tag-picker-popup';
  // Use fixed positioning so it's never clipped by overflow:hidden parents
  popup.style.cssText='position:fixed;z-index:1000;background:#fff;border:0.5px solid #ddd;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:6px;min-width:200px;max-height:320px;overflow-y:auto';

  TAG_COLORS.forEach(tc=>{
    const row=document.createElement('div');
    row.className='tag-picker-row';
    const isCurrent=(t.tagColor||'none')===tc.id;
    row.innerHTML=`<div class="tag-picker-swatch" style="background:${tc.bg==='transparent'?'#f5f5f3':tc.bg};border:1.5px solid ${tc.id==='none'?'#ddd':tc.border}"></div>
      <span style="flex:1;font-size:12px">${tc.label}</span>
      ${isCurrent?'<i class="ti ti-check" style="font-size:10px;color:#378ADD"></i>':''}`;
    row.onclick=async(e)=>{
      e.stopPropagation();
      popup.remove();
      await setTaskTag(taskId, tc.id);
    };
    popup.appendChild(row);
  });

  document.body.appendChild(popup);

  // Position: calculate where to place it avoiding viewport edges
  const btnRect=btn.getBoundingClientRect();
  const vpW=window.innerWidth, vpH=window.innerHeight;
  const popW=220, popH=Math.min(320, TAG_COLORS.length*36+16);

  let left=btnRect.left;
  let top=btnRect.bottom+4;

  // Flip left if overflows right edge
  if(left+popW>vpW-8) left=Math.max(8, btnRect.right-popW);
  // Flip above if overflows bottom edge
  if(top+popH>vpH-8) top=Math.max(8, btnRect.top-popH-4);

  popup.style.left=left+'px';
  popup.style.top=top+'px';

  // Close on outside click or scroll
  const close=()=>{ popup.remove(); document.removeEventListener('click',close); document.removeEventListener('scroll',close,true); };
  setTimeout(()=>{ document.addEventListener('click',close); document.addEventListener('scroll',close,true); },0);
}

async function setTaskTag(taskId, tagColorId){
  const t=tasks.find(x=>String(x.id)===String(taskId));if(!t)return;
  const prev=t.tagColor||'none';
  t.tagColor=tagColorId;
  renderDaily();
  const res=await api('updateTask',{id:String(t.id),tagColor:tagColorId});
  if(!res||res.ok===false||res.error){t.tagColor=prev;renderDaily();showToast('❌ 更新失敗');}
}

function startRenameTask(id, btn){
  const t=tasks.find(x=>String(x.id)===String(id));if(!t)return;
  const el=btn.closest('.task-item');
  const textDiv=el.querySelector('.task-text');
  if(textDiv) textDiv.dispatchEvent(new MouseEvent('dblclick',{bubbles:true}));
}

async function quickAdd(input, date, createGantt){
  const text=input.value.trim();if(!text)return;
  let projId=activeProject;
  if(!projId&&activeOwnerFilter){
    const ownerProj=projects.find(p=>(p.owner||'未指派')===activeOwnerFilter&&p.status!=='closed');
    if(ownerProj) projId=ownerProj.id;
  }
  if(!projId) projId=projects.find(p=>p.status!=='closed')?.id||null;
  input.value='';
  input.disabled=true;
  const ganttStart=createGantt?date:'';
  const ganttEnd=createGantt?date:'';
  const res=await api('addTask',{text,date,projId,done:false,prog:0,ganttStart,ganttEnd,tagColor:'',repeat:'none',repeatRule:''});
  input.disabled=false;
  if(res&&res.id){
    tasks.push({id:String(res.id),text,date,projId:String(projId),done:false,prog:0,ganttStart,ganttEnd,tagColor:'none',repeat:'none',repeatRule:''});
    renderDaily();renderProjects();
    if(createGantt) renderGantt();
    showToast(createGantt?'✓ 已新增並建立甘特圖':'✓ 已新增並同步');
  } else {
    input.value=text;
    showToast('❌ 新增失敗');
  }
}

async function toggleTask(id){
  const t=tasks.find(x=>String(x.id)===String(id));if(!t)return;
  const prev=t.done;
  t.done=!(t.done===true||String(t.done)==='true');
  renderDaily();
  const res=await api('updateTask',{id:String(t.id),done:t.done});
  if(!res||res.error){
    t.done=prev;renderDaily();showToast('❌ 更新失敗，請重試');
  } else {
    showToast(t.done?'✓ 任務完成，已同步':'已取消完成');
  }
}

async function deleteTask(id){
  const t=tasks.find(x=>String(x.id)===String(id));if(!t)return;

  // If task has gantt dates, only clear the daily date (keep gantt)
  if(t.ganttStart && t.ganttEnd){
    const prev=t.date;
    t.date='';  // remove from daily view
    renderDaily();renderProjects();
    const res=await api('updateTask',{id:String(t.id),date:'9999-01-01'}); // sentinel date, hidden from daily
    if(!res||res.error){
      t.date=prev;renderDaily();renderProjects();showToast('❌ 刪除失敗，請重試');
    } else {
      showToast('✓ 已從每日待辦移除（甘特圖保留）');
    }
    return;
  }

  // No gantt dates — fully delete
  const prev=[...tasks];
  tasks=tasks.filter(t=>String(t.id)!==String(id));
  renderDaily();renderProjects();renderGantt();
  const res=await api('deleteTask',{id:String(id)});
  if(!res||res.error){
    tasks=prev;renderDaily();renderProjects();renderGantt();
    showToast('❌ 刪除失敗，請重試');
  } else {
    showToast('✓ 任務已刪除並同步');
  }
}

async function moveTask(id){
  const t=tasks.find(x=>String(x.id)===String(id));if(!t)return;
  const d=prompt('移動到哪天？（YYYY-MM-DD）',t.date);
  if(d&&/\d{4}-\d{2}-\d{2}/.test(d)){
    const prev=t.date;
    const prevGS=t.ganttStart, prevGE=t.ganttEnd;
    const isSingleDayGantt=t.ganttStart&&t.ganttEnd&&normDate(t.ganttStart)===normDate(t.ganttEnd);
    t.date=d;
    if(isSingleDayGantt){ t.ganttStart=d; t.ganttEnd=d; }
    renderDaily();
    const updateData={id:String(t.id),date:d};
    if(isSingleDayGantt){ updateData.ganttStart=d; updateData.ganttEnd=d; }
    const res=await api('updateTask',updateData);
    if(!res||res.error){
      t.date=prev; t.ganttStart=prevGS; t.ganttEnd=prevGE;
      renderDaily();showToast('❌ 移動失敗，請重試');
    } else {
      if(isSingleDayGantt) renderGantt();
      showToast(isSingleDayGantt?'✓ 已移動，甘特圖同步更新':'✓ 已移動並同步');
    }
  }
}

async function addProject(){
  const name=prompt('專案名稱：');if(!name)return;
  const color=COLORS[projects.length%COLORS.length];
  // Auto-assign current user as owner
  const res=await api('addProject',{name,color,members:[0],owner:currentUser});
  if(res&&res.id){
    projects.push({id:String(res.id),name,color,status:'proposal',owner:res.owner||currentUser});
    renderProjects();
    showToast('✓ 專案已建立，自動指派給：'+( res.owner||currentUser));
  }
  else if(res&&res.error){showToast('❌ 建立失敗：'+res.error);}
}

function toggleAddForm(){

async function addGanttTask(){
  const name=document.getElementById('f-name').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const projId=document.getElementById('f-proj').value;
  const prog=parseInt(document.getElementById('f-prog').value);
  if(!name||!start||!end){showToast('請填入名稱及日期');return;}
  if(start>end){showToast('結束日期不能早於開始');return;}
  const res=await api('addTask',{text:name,date:start,projId,done:false,ganttStart:start,ganttEnd:end,prog});
  if(res&&res.id){
    const newTask={id:String(res.id),text:name,date:start,projId:String(projId),done:false,ganttStart:start,ganttEnd:end,prog,tagColor:'none',repeat:'none',repeatRule:''};
    tasks.push(newTask);
    toggleAddForm();renderGantt();renderProjects();
    showToast('✓ 任務已新增至甘特圖');
    // Auto sync to daily todos
    await syncGanttToDaily(newTask);
  }
  else if(res&&res.error){showToast('❌ 新增失敗：'+res.error);}
}

// ── Drag & Drop for task rows ──
let _ganttDragId=null, _ganttDragGroup=null;

function ganttDragStart(e,taskId){
  _ganttDragId=taskId; _ganttDragGroup=null;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{ const el=e.target.closest('.gantt-row'); if(el) el.classList.add('dragging'); },0);
}
function ganttGroupDragStart(e,gName){
  _ganttDragGroup=gName; _ganttDragId=null;
  e.dataTransfer.effectAllowed='move';
}
function ganttDragOver(e,targetId){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.gantt-row.drag-over,.gantt-group-header.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=e.currentTarget; if(el) el.classList.add('drag-over');
}
function ganttDragLeave(e){
  e.currentTarget?.classList.remove('drag-over');
}
function ganttDrop(e,targetTaskId){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.gantt-row,.gantt-group-header').forEach(el=>el.classList.remove('drag-over','dragging'));

  if(_ganttDragId&&_ganttDragId!==targetTaskId){
    // Reorder tasks
    const allIds=[...new Set([...tasks.filter(t=>t.ganttStart&&t.ganttEnd).map(t=>String(t.id))])];
    let order=ganttOrder.length?[...ganttOrder]:[...allIds];
    // Ensure all ids are in order
    allIds.forEach(id=>{ if(!order.includes(id)) order.push(id); });
    const fromIdx=order.indexOf(_ganttDragId);
    const toIdx=order.indexOf(targetTaskId);
    if(fromIdx>=0&&toIdx>=0){
      order.splice(fromIdx,1);
      order.splice(toIdx,0,_ganttDragId);
      ganttOrder=order;
      localStorage.setItem('pm_gantt_order',JSON.stringify(ganttOrder));
    }
  }
  _ganttDragId=null; _ganttDragGroup=null;
  renderGantt();
}
function ganttGroupDrop(e,targetGroup){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.gantt-row,.gantt-group-header').forEach(el=>el.classList.remove('drag-over','dragging'));
  if(!_ganttDragId) return;
  // Move task to group
  ganttGroups[_ganttDragId]=targetGroup||'';
  if(!targetGroup) delete ganttGroups[_ganttDragId];
  localStorage.setItem('pm_gantt_groups',JSON.stringify(ganttGroups));
  _ganttDragId=null; renderGantt();
}

function editCellNote(taskId,ds){

  // Show inline popup
  const old=document.getElementById('cell-note-popup');

  const popup=document.createElement('div');
  popup.id='cell-note-popup';
  popup.style.cssText='position:fixed;z-index:600;background:#fff;border:0.5px solid #ddd;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:12px;width:220px';
  popup.innerHTML=`
    <div style="font-size:11px;font-weight:500;color:#555;margin-bottom:8px">${ds} 備註</div>
    <textarea id="cnp-text" rows="3" style="width:100%;font-size:12px;border:0.5px solid #ddd;border-radius:6px;padding:5px 8px;font-family:inherit;resize:none;outline:none">${existing.note}</textarea>

      <button class="g-btn primary" style="font-size:11px;padding:3px 8px" onclick="saveCellNote('${key}')">儲存</button>
    </div>`;
  document.body.appendChild(popup);

  // Position near cursor
  const x=Math.min(event.clientX,window.innerWidth-230);
  const y=Math.min(event.clientY,window.innerHeight-160);
  popup.style.left=x+'px'; popup.style.top=y+'px';

  setTimeout(()=>document.addEventListener('click',function h(ev){
    if(!popup.contains(ev.target)){popup.remove();document.removeEventListener('click',h);}
  }),0);
}

async function saveCellNote(key){
  const text=document.getElementById('cnp-text')?.value.trim();
  const color=document.getElementById('cnp-color')?.value||'#378ADD';
  if(text){ ganttCellNotes[key]={note:text,color}; }
  else { delete ganttCellNotes[key]; }
  localStorage.setItem('pm_gantt_notes',JSON.stringify(ganttCellNotes));
  document.getElementById('cell-note-popup')?.remove();
  renderGantt();

  // If note added, sync that date to daily todos
  if(text){
    const [taskId,ds]=key.split('_');
    const t=tasks.find(x=>String(x.id)===taskId);
    if(t&&ds){
      const existing=tasks.find(x=>x.text===`${t.text}（${text}）`&&normDate(x.date)===ds&&String(x.projId)===String(t.projId));
      if(!existing){
        const res=await api('addTask',{
          text:`${t.text}（${text}）`, date:ds, projId:String(t.projId),
          done:false, prog:0, ganttStart:'', ganttEnd:'',
          tagColor:'', repeat:'none', repeatRule:''
        });
        if(res&&res.id){
          tasks.push({id:String(res.id),text:`${t.text}（${text}）`,date:ds,
            projId:String(t.projId),done:false,prog:0,ganttStart:'',ganttEnd:'',
            tagColor:'none',repeat:'none',repeatRule:''});
          renderDaily();renderProjects();
          showToast('✓ 備註已加入每日待辦：'+ds);
        }
      }
    }
  }
}
function deleteCellNote(key){
  delete ganttCellNotes[key];
  localStorage.setItem('pm_gantt_notes',JSON.stringify(ganttCellNotes));
  document.getElementById('cell-note-popup')?.remove();
  renderGantt();
}

function showNoteTooltip(e,key){
  const note=ganttCellNotes[key];
  if(!note||!note.note) return;
  hideNoteTooltip();
  const tip=document.createElement('div');
  tip.id='gantt-note-tip';
  tip.className='gantt-note-tooltip';
  tip.textContent=note.note;
  document.body.appendChild(tip);
  const x=Math.min(e.clientX+12,window.innerWidth-220);
  const y=e.clientY-36;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideNoteTooltip(){
  document.getElementById('gantt-note-tip')?.remove();
}

function exportBackup(){
  if(!tasks.length&&!projects.length){showToast('尚無資料可備份');return;}

  const wb = XLSX.utils.book_new();

  // ── Tasks sheet ──
  const taskHeaders=['id','text','date','projId','done','ganttStart','ganttEnd','prog','assignee','remindAt','tagColor','repeat','repeatRule'];
  const taskRows=tasks.map(t=>[
    t.id, t.text, t.date, t.projId, t.done,
    t.ganttStart||'', t.ganttEnd||'', t.prog||0,
    t.assignee||'', t.remindAt||'',
    t.tagColor||'', t.repeat||'none', t.repeatRule||''
  ]);
  const taskWs=XLSX.utils.aoa_to_sheet([taskHeaders,...taskRows]);
  taskWs['!cols']=[{wch:16},{wch:40},{wch:12},{wch:16},{wch:6},{wch:12},{wch:12},{wch:6},{wch:12},{wch:12},{wch:14},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb, taskWs, '待辦任務');

  // ── Projects sheet ──
  const projHeaders=['id','name','color','status','owner'];
  const projRows=projects.map(p=>[p.id, p.name, p.color, p.status||'', p.owner||'']);
  const projWs=XLSX.utils.aoa_to_sheet([projHeaders,...projRows]);
  projWs['!cols']=[{wch:16},{wch:30},{wch:10},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb, projWs, '專案');

  // ── Members sheet ──
  if(members.length){
    const memHeaders=['id','name','initials','email','role'];
    const memRows=members.map(m=>[m.id,m.name,m.initials,m.email,m.role]);
    const memWs=XLSX.utils.aoa_to_sheet([memHeaders,...memRows]);

  XLSX.writeFile(wb, filename);

function processExcelFile(file){
  // Use filename (without extension) as default group name
  window.importFileName=file.name.replace(/[.]xlsx?$/i,'').replace(/^_+/,'').trim().slice(0,30);
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      // Use SheetJS to parse
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array',cellDates:true});

      // Find schedule sheet
      const sheetName=workbook.SheetNames.find(n=>n.includes('排程')||n.includes('Schedule'))||workbook.SheetNames[0];
      const ws=workbook.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});

      const tasks=parseScheduleRows(rows);
      showImportPreview(tasks);
    }catch(err){
      document.getElementById('import-preview').innerHTML=
        `<div style="color:#E24B4A;font-size:12px;padding:10px;background:#FEF2F2;border-radius:8px">解析失敗：${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseScheduleRows(rows){
  const typeMap={1:'提供切角',3:'客戶確認切角',5:'提供文章',7:'客戶確認文章',9:'其他排程',11:'文章上線',13:'備註'};
  const dayCols=[0,2,4,6,8,10,12];
  const headerValues=new Set(['提供切角','客戶確認切角','提供文章','客戶確認文章','其他排程','文章上線','備註','注意事項','Sun.','Mon.','Tue.','Wed.','Thu.','Fri.','Sat.','備註']);

  let currentMonth=null, currentYear=new Date().getFullYear(), currentDates={};
  const tasks=[];

  function isDayInt(v){
    if(v===true||v===false) return false;
    if(typeof v==='number') return v>=1&&v<=31&&Math.floor(v)===v;
    if(typeof v==='string'&&v.trim()!==''){
      const n=Number(v.trim());
      return !isNaN(n)&&n>=1&&n<=31&&Number.isInteger(n);
    }
    return false;
  }
  function toNum(v){ return typeof v==='string'?Number(v.trim()):Number(v); }

  rows.forEach(row=>{
    if(!row) return;
    const r=row.concat(Array(20).fill(null));

    // Year
    if(typeof r[0]==='string'&&/202[0-9]/.test(r[0])){
      const m=r[0].match(/202[0-9]/);
      if(m) currentYear=parseInt(m[0]);
    }

    // Month
    if(typeof r[0]==='string'&&r[0].endsWith('月份')){
      const m=parseInt(r[0]);
      if(!isNaN(m)){currentMonth=m;currentDates={};}
      return;
    }
    if(currentMonth===null) return;

    // Date row: actual integers (not bool) in day columns
    if(dayCols.some(c=>isDayInt(r[c]))){
      currentDates={};
      dayCols.forEach(c=>{ if(isDayInt(r[c])) currentDates[c]=Math.floor(toNum(r[c])); });
      return;
    }

    // Format 1: TRUE flag in day col → text in adjacent task col
    let foundFlag=false;
    dayCols.forEach(dc=>{
      const cell=r[dc];
      if(cell===true||cell==='TRUE'||cell==='true'||cell===1){
        foundFlag=true;
        for(const offset of [1,-1]){
          const tc=dc+offset;
          if(tc>=0&&tc<r.length&&typeof r[tc]==='string'&&r[tc].trim()&&!headerValues.has(r[tc].trim())){
            const day=currentDates[dc];
            if(day){
              try{
                const dt=new Date(currentYear,currentMonth-1,day);
                const ds=fmtDate(dt);
                const taskType=typeMap[tc]||'任務';
                tasks.push({date:ds,task:`[${taskType}] ${r[tc].replace(/\n/g,' ').trim()}`,selected:true});
              }catch(e){}
            }
            break;
          }
        }
      }
    });
    if(foundFlag) return;

    // Format 2: text directly in odd (task type) columns, day determined by col-1
    Object.entries(typeMap).forEach(([tcStr,taskType])=>{
      const tc=parseInt(tcStr);
      const cell=r[tc];
      if(typeof cell==='string'&&cell.trim()&&!headerValues.has(cell.trim())){
        const dc=tc-1; // corresponding day column
        const day=currentDates[dc];
        if(day){
          try{
            const dt=new Date(currentYear,currentMonth-1,day);
            const ds=fmtDate(dt);
            tasks.push({date:ds,task:`[${taskType}] ${cell.replace(/\n/g,' ').trim()}`,selected:true});
          }catch(e){}
        }
      }
    });
  });

  // Deduplicate by date+task
  const seen=new Set();
  return tasks.filter(t=>{
    const k=t.date+'|'+t.task;
    if(seen.has(k)) return false;
    seen.add(k); return true;
  });
}

async function confirmImport(){
  const sel=(window.importTasks||[]).filter(t=>t.selected);
  if(!sel.length){showToast('請至少選擇一筆任務');return;}
  const projId=document.getElementById('import-proj-sel').value;
  if(!projId){showToast('請選擇專案');return;}

  const groupName=document.getElementById('import-group-name')?.value.trim()||'匯入排程';
  document.getElementById('import-overlay').remove();

  showToast('匯入中，請稍候...');

  let added=0;
  const newTaskIds=[];

  // Each task = one gantt bar (start=end=that day) + daily todo
  for(const t of sel){
    const r=await api('addTask',{
      text:t.task, date:t.date, projId,
      done:false, prog:0,
      ganttStart:t.date, ganttEnd:t.date,
      tagColor:'', repeat:'none', repeatRule:''
    });
    if(r&&r.id){
      const newTask={
        id:String(r.id), text:t.task, date:t.date,
        projId:String(projId), done:false, prog:0,
        ganttStart:t.date, ganttEnd:t.date,
        tagColor:'none', repeat:'none', repeatRule:''
      };
      tasks.push(newTask);
      newTaskIds.push(String(r.id));
      added++;
    }
  }

  // Auto-assign all imported tasks to the same group
  if(groupName&&newTaskIds.length){
    newTaskIds.forEach(id=>{ ganttGroups[id]=groupName; });
    localStorage.setItem('pm_gantt_groups',JSON.stringify(ganttGroups));
  }

  renderGantt();renderDaily();renderProjects();
  showToast('✓ 匯入完成：'+added+' 筆任務已加入甘特圖、每日待辦，群組「'+groupName+'」');
}

function openGanttGroupPicker(taskId, e){
  e.stopPropagation();
  document.querySelectorAll('.gantt-group-popup').forEach(p=>p.remove());
  const t=tasks.find(x=>String(x.id)===taskId);if(!t)return;
  const curGroup=ganttGroups[taskId]||'';

  // Collect existing group names
  const existingGroups=[...new Set(Object.values(ganttGroups).filter(Boolean))].sort();

  const popup=document.createElement('div');
  popup.className='gantt-group-popup';
  popup.style.cssText='position:fixed;z-index:1000;background:#fff;border:0.5px solid #ddd;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:6px;min-width:180px';

  // No group option
  const noneRow=document.createElement('div');
  noneRow.className='tag-picker-row';
  noneRow.innerHTML=`<i class="ti ti-x" style="font-size:11px;color:#aaa;width:16px"></i><span style="flex:1;font-size:12px;color:#888">移出群組</span>${!curGroup?'<i class="ti ti-check" style="font-size:10px;color:#378ADD"></i>':''}`;
  noneRow.onclick=ev=>{ev.stopPropagation();popup.remove();delete ganttGroups[taskId];localStorage.setItem('pm_gantt_groups',JSON.stringify(ganttGroups));renderGantt();showToast('已移出群組');};
  popup.appendChild(noneRow);

  // Existing groups
  existingGroups.forEach(g=>{
    const row=document.createElement('div');
    row.className='tag-picker-row';
    row.innerHTML=`<i class="ti ti-layout-list" style="font-size:11px;color:#378ADD;width:16px"></i><span style="flex:1;font-size:12px">${g}</span>${curGroup===g?'<i class="ti ti-check" style="font-size:10px;color:#378ADD"></i>':''}`;
    row.onclick=ev=>{ev.stopPropagation();popup.remove();ganttGroups[taskId]=g;localStorage.setItem('pm_gantt_groups',JSON.stringify(ganttGroups));renderGantt();showToast('已加入群組：'+g);};
    popup.appendChild(row);
  });

  // New group
  const newRow=document.createElement('div');
  newRow.className='tag-picker-row';
  newRow.style.cssText='border-top:0.5px solid #f0f0ed;margin-top:4px;padding-top:8px';
  newRow.innerHTML=`<i class="ti ti-plus" style="font-size:11px;color:#4F7BE9;width:16px"></i><span style="font-size:12px;color:#4F7BE9">建立新群組...</span>`;
  newRow.onclick=ev=>{
    ev.stopPropagation();popup.remove();
    const name=prompt('新群組名稱：','');
    if(!name||!name.trim())return;
    ganttGroups[taskId]=name.trim();
    localStorage.setItem('pm_gantt_groups',JSON.stringify(ganttGroups));
    renderGantt();showToast('✓ 已建立群組：'+name.trim());
  };
  popup.appendChild(newRow);

  document.body.appendChild(popup);
  const btn=e.currentTarget||e.target;
  const rect=btn.getBoundingClientRect();
  let left=rect.right+4, top=rect.top;
  if(left+190>window.innerWidth-8) left=rect.left-194;
  if(top+200>window.innerHeight-8) top=Math.max(8,window.innerHeight-208);
  popup.style.left=left+'px'; popup.style.top=top+'px';
  const close=()=>{popup.remove();document.removeEventListener('click',close);};
  setTimeout(()=>document.addEventListener('click',close),0);
}

async function saveGanttEdit(taskId){
  const t=tasks.find(x=>String(x.id)===String(taskId)); if(!t) return;
  const name=document.getElementById('ge-name').value.trim();
  const start=document.getElementById('ge-start').value;
  const end=document.getElementById('ge-end').value;
  const projId=document.getElementById('ge-proj').value;
  const prog=parseInt(document.getElementById('ge-prog').value)||0;
  if(!name||!start||!end){showToast('請填入所有必填欄位');return;}
  if(start>end){showToast('結束日期不能早於開始');return;}

  const prev={text:t.text,ganttStart:t.ganttStart,ganttEnd:t.ganttEnd,projId:t.projId,prog:t.prog};
  t.text=name; t.ganttStart=start; t.ganttEnd=end;
  t.projId=String(projId); t.prog=prog; t.date=start;

  document.querySelector('.gantt-edit-modal')?.remove();
  renderGantt(); renderDaily(); renderProjects();

  const res=await api('updateTask',{id:String(t.id),text:name,date:start,ganttStart:start,ganttEnd:end,projId,prog});
  if(!res||res.error){
    Object.assign(t,prev); renderGantt(); renderDaily();
    showToast('❌ 儲存失敗');return;
  }

  // Always sync start/end/noted dates to daily todos
  await syncGanttToDaily(t);
  showToast('✓ 甘特圖任務已更新');
}

async function syncGanttToDaily(t){
  // Collect dates to add:
  // 1. Start date
  // 2. End date
  // 3. Any cell-noted dates within the range
  const startDs=normDate(t.ganttStart);
  const endDs=normDate(t.ganttEnd);
  if(!startDs||!endDs) return;

  const datesToAdd=new Set();
  datesToAdd.add(startDs);
  datesToAdd.add(endDs);

  // Find all cell notes for this task
  Object.keys(ganttCellNotes).forEach(key=>{
    if(key.startsWith(String(t.id)+'_')){
      const ds=key.slice(String(t.id).length+1);
      if(ds>=startDs&&ds<=endDs) datesToAdd.add(ds);
    }
  });

  // Find existing daily tasks created from this gantt task
  // We identify them by matching text AND projId AND no ganttStart (pure daily tasks)
  // AND date being exactly startDs or endDs — don't over-filter
  const existing=new Set(
    tasks.filter(x=>
      String(x.id)!==String(t.id) &&
      String(x.projId)===String(t.projId) &&
      !x.ganttStart &&
      (x.text===t.text || x.text.startsWith(t.text+'（'))
    ).map(x=>normDate(x.date))
  );

  let added=0;
  for(const ds of [...datesToAdd].sort()){
    if(existing.has(ds)) continue;
    // Get note text if any
    const noteKey=String(t.id)+'_'+ds;
    const cellNote=ganttCellNotes[noteKey];
    const taskText=cellNote&&cellNote.note
      ? `${t.text}（${cellNote.note}）`
      : t.text;
    const tagColor=cellNote&&cellNote.color?cellNote.color:'';

    const res=await api('addTask',{
      text:taskText, date:ds, projId:String(t.projId),
      done:false, prog:0, ganttStart:'', ganttEnd:'',
      tagColor:'', repeat:'none', repeatRule:''
    });
    if(res&&res.id){
      tasks.push({
        id:String(res.id), text:taskText, date:ds,
        projId:String(t.projId), done:false, prog:0,
        ganttStart:'', ganttEnd:'', tagColor:'none',
        repeat:'none', repeatRule:''
      });
      added++;
    }
  }
  if(added>0){renderDaily();renderProjects();showToast(`✓ 已新增 ${added} 筆每日待辦（開始日、結束日${datesToAdd.size>2?'、備註日':''}）`);}
  else{showToast('每日待辦已存在，無需重複新增');}
}

async function deleteGanttTask(taskId){
  if(!confirm('確定刪除此甘特圖任務？')) return;
  document.querySelector('.gantt-edit-modal')?.remove();
  const prev=[...tasks];
  tasks=tasks.filter(t=>String(t.id)!==String(taskId));
  renderGantt(); renderDaily(); renderProjects();
  const res=await api('deleteTask',{id:String(taskId)});
  if(!res||res.error){tasks=prev;renderGantt();renderDaily();renderProjects();showToast('❌ 刪除失敗');}
  else{showToast('✓ 任務已刪除');}
}

function checkGanttReminders(){
  const todayS=fmtDate(today);
  const ganttTasks=tasks.filter(t=>normDate(t.ganttStart)&&normDate(t.ganttEnd));
  const remindEvents=[];
  ganttTasks.forEach(t=>{
    const ts=normDate(t.ganttStart), te=normDate(t.ganttEnd);
    const dayBefore=fmtDate(addDays(dateOf(ts),-1));
    const dayAfterEnd=fmtDate(addDays(dateOf(te),-1));
    const threeBefore=fmtDate(addDays(dateOf(te),-3));
    if(dayBefore===todayS) remindEvents.push({task:t,type:'start-tomorrow',msg:`明天開始：「${t.text}」`});
    if(ts===todayS)        remindEvents.push({task:t,type:'start-today',  msg:`今天開始：「${t.text}」`});
    if(threeBefore===todayS) remindEvents.push({task:t,type:'end-3days', msg:`3天後截止：「${t.text}」（${te}）`});
    if(dayAfterEnd===todayS) remindEvents.push({task:t,type:'end-tomorrow',msg:`明天截止：「${t.text}」`});
  });

  if(!remindEvents.length) return;

  // Check which ones we haven't notified today
  const notifiedKey='pm_notified_'+todayS;
  const notified=JSON.parse(localStorage.getItem(notifiedKey)||'[]');
  const newEvents=remindEvents.filter(e=>!notified.includes(e.task.id+'_'+e.type));
  if(!newEvents.length) return;

  // Add to notifications list
  newEvents.forEach(e=>{
    const typeColors={
      'start-tomorrow':{bg:'#E6F1FB',ic:'#0C447C',icon:'ti-player-play'},
      'start-today':   {bg:'#EAF3DE',ic:'#27500A',icon:'ti-rocket'},
      'end-3days':     {bg:'#FFF7ED',ic:'#92400E',icon:'ti-alarm'},
      'end-tomorrow':  {bg:'#FCEBEB',ic:'#791F1F',icon:'ti-alert-triangle'},
    };
    const c=typeColors[e.type]||{bg:'#f5f5f3',ic:'#555',icon:'ti-bell'};
    notifications.unshift({id:Date.now()+Math.random(),type:'gantt-remind',
      title:e.msg, time:'今天', read:false,
      icon:c.icon, bg:c.bg, ic:c.ic});
  });
  updateBadge();

  // Toast the first one
  showToast('🔔 '+newEvents[0].msg);

  // Mark as notified
  const allNotified=[...notified,...newEvents.map(e=>e.task.id+'_'+e.type)];
  localStorage.setItem(notifiedKey, JSON.stringify(allNotified));
}

function renderGantt(){
  const scale=document.getElementById('gantt-scale').value;
  const days=scale==='week'?14:scale==='month'?30:90;
  const startDate=dateOf(document.getElementById('gantt-start').value)||addDays(today,-3);
  const endDate=addDays(startDate,days-1);
  const todayS=fmtDate(today);

  const ownerSel=document.getElementById('gantt-owner-filter');
  if(ownerSel){
    const curOwner=ownerSel.value;
    const owners=[...new Set(projects.filter(p=>p.owner).map(p=>p.owner))].sort();
    ownerSel.innerHTML='<option value="">全部</option>'+owners.map(o=>`<option value="${o}"${o===curOwner?'selected':''}>${o===currentUser?o+' (我)':o}</option>`).join('');
  }
  const ownerFilter=ownerSel?ownerSel.value:'';

  let allGanttTasks=filteredTasks().filter(t=>normDate(t.ganttStart)&&normDate(t.ganttEnd));
  if(ownerFilter){
    const ownerProjIds=projects.filter(p=>p.owner===ownerFilter).map(p=>String(p.id));
    allGanttTasks=allGanttTasks.filter(t=>ownerProjIds.includes(String(t.projId)));
  }

  // Separate active and ended tasks
  const activeTasks=allGanttTasks.filter(t=>dateOf(t.ganttEnd)>=today);
  const endedTasks=allGanttTasks.filter(t=>dateOf(t.ganttEnd)<today);

  // Apply saved order
  function applyOrder(arr){
    if(!ganttOrder.length) return arr;
    const ordered=[], rest=[];
    ganttOrder.forEach(id=>{ const t=arr.find(x=>String(x.id)===id); if(t) ordered.push(t); });
    arr.forEach(t=>{ if(!ganttOrder.includes(String(t.id))) rest.push(t); });
    return [...ordered,...rest];
  }

  // Build reminder badges
  const remindMap={};
  allGanttTasks.forEach(t=>{
    const ts=normDate(t.ganttStart),te=normDate(t.ganttEnd);
    const flags=[];
    if(fmtDate(addDays(dateOf(ts),-1))===todayS) flags.push({label:'明天開始',color:'#0C447C',bg:'#E6F1FB'});
    if(ts===todayS) flags.push({label:'今天開始',color:'#27500A',bg:'#EAF3DE'});
    if(fmtDate(addDays(dateOf(te),-3))===todayS) flags.push({label:'3天後截止',color:'#92400E',bg:'#FFF7ED'});
    if(fmtDate(addDays(dateOf(te),-1))===todayS) flags.push({label:'明天截止',color:'#791F1F',bg:'#FCEBEB'});
    if(flags.length) remindMap[String(t.id)]=flags;
  });

  const DW=scale==='quarter'?18:scale==='month'?26:44;
  const totalW=200+days*DW;

  function renderTaskRow(t){
    const proj=projects.find(p=>String(p.id)===String(t.projId)),color=proj?proj.color:'#888';
    const ts=dateOf(t.ganttStart),te=dateOf(t.ganttEnd);
    const startDiff=Math.round((ts-startDate)/86400000);
    const dur=Math.round((te-ts)/86400000)+1;
    const barLeft=Math.max(startDiff*DW,0);
    const barW=Math.min(Math.max(dur*DW-2,4),days*DW-barLeft-2);
    const visible=te>=startDate&&ts<=endDate;
    const progPct=Math.round(t.prog||0);
    const remind=remindMap[String(t.id)]||[];
    const remindBadges=remind.map(r=>`<span class="gantt-remind-badge" style="background:${r.bg};color:${r.color}">${r.label}</span>`).join('');

    let cellsHtml='';
    for(let i=0;i<days;i++){
      const ds=fmtDate(addDays(startDate,i));
      const noteKey=t.id+'_'+ds;
      const note=ganttCellNotes[noteKey];
      const cellColor=note?note.color:'';
      cellsHtml+=`<div class="gantt-cell${ds===todayS?' tc':''}" style="width:${DW}px;position:relative;${cellColor?'background:'+cellColor+'22':''}">
        ${note?`<div class="gantt-cell-dot" style="background:${note.color||'#378ADD'}" title="${note.note}"></div>`:''}
        <div class="gantt-cell-note" ondblclick="editCellNote('${t.id}','${ds}')"
          onmouseenter="showNoteTooltip(event,'${noteKey}')"
          onmouseleave="hideNoteTooltip()"></div>
      </div>`;
    }

    return `<div class="gantt-row" data-task-id="${t.id}" style="min-width:${totalW}px"
      draggable="true"
      ondragstart="ganttDragStart(event,'${t.id}')"
      ondragover="ganttDragOver(event,'${t.id}')"
      ondragleave="ganttDragLeave(event)"
      ondrop="ganttDrop(event,'${t.id}')">
      <div style="width:200px;min-width:200px;padding:5px 8px;border-right:0.5px solid #e5e5e0;flex-shrink:0;display:flex;align-items:center;gap:4px;position:relative" class="gantt-row-label-wrap">
        <i class="ti ti-grip-vertical" style="font-size:11px;color:#ccc;cursor:grab;flex-shrink:0"></i>
        <div class="proj-dot" style="background:${color}"></div>
        <div style="min-width:0;flex:1;cursor:pointer" onclick="openGanttEdit('${t.id}')">
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;display:flex;align-items:center;gap:4px">
            ${t.text}${remindBadges}
          </div>
          <div style="font-size:10px;color:#888">${proj?proj.name+' · ':''}${t.ganttStart}~${t.ganttEnd}${progPct?' · '+progPct+'%':''}</div>
        </div>
        <div class="gantt-row-actions" style="display:none;gap:2px;flex-shrink:0">
          <button class="task-action-btn" title="設定群組" onclick="openGanttGroupPicker('${t.id}',event)" style="font-size:11px"><i class="ti ti-layout-list"></i></button>
          <button class="task-action-btn" title="編輯" onclick="openGanttEdit('${t.id}')" style="font-size:11px"><i class="ti ti-pencil"></i></button>
        </div>
      </div>
      <div class="gantt-timeline-row" style="position:relative">
        ${cellsHtml}
        ${visible&&barW>0?`<div class="gantt-bar" style="left:${barLeft+1}px;width:${barW}px;background:${color}" onclick="openGanttEdit('${t.id}')"><div class="gantt-prog" style="width:${progPct}%"></div><span style="position:relative;z-index:1">${barW>60?t.text:''}</span></div>`:''}
      </div>
    </div>`;
  }

  // Build groups
  const groupMap={};
  const ungrouped=[];
  applyOrder(activeTasks).forEach(t=>{
    const g=ganttGroups[String(t.id)];
    if(g){ if(!groupMap[g]) groupMap[g]=[]; groupMap[g].push(t); }
    else ungrouped.push(t);
  });

  let html=`<div style="min-width:${totalW}px">`;
  // Header
  html+=`<div class="gantt-head" style="min-width:${totalW}px"><div class="gantt-label-col" style="width:200px;min-width:200px">任務 / 專案</div><div style="flex:1;display:flex">`;
  for(let i=0;i<days;i++){
    const d=addDays(startDate,i),ds=fmtDate(d),isT=ds===todayS;
    const lbl=scale==='quarter'?(d.getDate()===1?d.toLocaleDateString('zh-TW',{month:'short'}):d.getDate()%7===1?d.getDate():''):scale==='month'?(d.getDay()===0||d.getDate()===1?d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}):''):d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    html+=`<div class="gantt-day-head${isT?' tc':''}" style="width:${DW}px">${lbl}</div>`;
  }
  html+=`</div></div>`;

  if(!activeTasks.length&&!endedTasks.length){
    html+=`<div class="empty-state">尚無甘特圖任務</div>`;
  } else {
    // Groups
    Object.keys(groupMap).forEach(gName=>{
      const collapsed=ganttGroupCollapsed[gName];
      html+=`<div class="gantt-group-header" onclick="toggleGanttGroup('${gName}')"
        draggable="true"
        ondragstart="ganttGroupDragStart(event,'${gName}')"
        ondragover="ganttDragOver(event,'__group__${gName}')"
        ondrop="ganttGroupDrop(event,'${gName}')">
        <i class="ti ${collapsed?'ti-chevron-right':'ti-chevron-down'}" style="font-size:10px"></i>
        <span style="flex:1">${gName}</span>
        <span style="font-size:10px;color:#bbb">${groupMap[gName].length} 項</span>
      </div>`;
      if(!collapsed) groupMap[gName].forEach(t=>{ html+=renderTaskRow(t); });
    });
    // Ungrouped
    ungrouped.forEach(t=>{ html+=renderTaskRow(t); });
    // Ended tasks section
    if(endedTasks.length){
      html+=`<div class="gantt-ended-section">
        <div class="gantt-ended-header" onclick="toggleGanttEnded()">
          <i class="ti ${ganttEndedCollapsed?'ti-chevron-right':'ti-chevron-down'}" style="font-size:11px"></i>
          <span>已結束任務（${endedTasks.length} 項）</span>
        </div>`;
      if(!ganttEndedCollapsed){
        endedTasks.forEach(t=>{ html+=renderTaskRow(t); });
      }
      html+=`</div>`;
    }
  }
  html+='</div>';
  document.getElementById('gantt-container').innerHTML=html;
}

function setQuick(mode){
  const now=new Date();
  if(mode===0)now.setMinutes(now.getMinutes()+30);
  else if(mode===1)now.setHours(now.getHours()+1);
  else now.setDate(now.getDate()+1);
  document.getElementById('r-time').value=now.toISOString().slice(0,16);
}
async function deleteRemind(id){

async function addRemind(){
  const tid=document.getElementById('r-task').value;

  updateBadge();renderRemind();showToast('✓ 提醒已新增並同步');
}

function openAddInvoice(projId){
  document.querySelectorAll('.inv-add-form').forEach(f=>f.classList.remove('open'));
  const f=document.getElementById('inv-form-'+projId);
  if(f){ f.classList.add('open'); document.getElementById('inv-date-'+projId).value=fmtDate(new Date()); }
}
function closeAddInvoice(projId){ document.getElementById('inv-form-'+projId).classList.remove('open'); }

async function saveInvoice(projId){
  const date=document.getElementById('inv-date-'+projId).value;
  const amount=document.getElementById('inv-amt-'+projId).value;
  const note=document.getElementById('inv-note-'+projId).value;
  const paid=document.getElementById('inv-paid-'+projId).value==='true';
  if(!date||!amount){showToast('請填入日期與金額');return;}
  const res=await api('addInvoice',{projId,date,amount:Number(amount),note,paid});
  if(res&&res.id){
    invoices.push({id:String(res.id),projId:String(projId),date,amount:Number(amount),note,paid});
    // If not paid, also add to tasks as a to-do
    if(!paid){
      const proj=projects.find(p=>String(p.id)===String(projId));
      const taskText=`請款：${proj?proj.name:''}${note?' - '+note:''} ${fmt(amount)}`;
      const r2=await api('addTask',{text:taskText,date,projId,done:false,ganttStart:date,ganttEnd:date,prog:0});
      if(r2&&r2.id) tasks.push({id:r2.id,text:taskText,date,projId,done:false,ganttStart:date,ganttEnd:date,prog:0});
    }
    closeAddInvoice(projId);
    renderInvoice();renderDaily();renderGantt();
    showToast('✓ 請款日已新增並同步');
    if(paid) await checkAndAutoClose(projId);
  }
}

async function checkAndAutoClose(projId){
  const projInvs = invoices.filter(i=>String(i.projId)===String(projId));
  if(!projInvs.length) return;
  const allPaid = projInvs.every(i=>String(i.paid)==='true'||i.paid===true);
  const p = projects.find(x=>String(x.id)===String(projId));
  if(!p) return;
  if(allPaid && p.status!=='closed'){
    p.status='closed';
    renderProjects(); renderInvoice();
    const res=await api('closeProject',{id:String(projId),status:'closed'});
    if(!res||res.error){ p.status='active'; renderProjects(); renderInvoice(); showToast('❌ 自動結案失敗'); }
    else{ showToast('🎉 所有款項已完成，專案已自動結案！'); }
  }
}

async function deleteInvSection(projId){
  const p=projects.find(x=>String(x.id)===String(projId));if(!p)return;
  const hasInvs=invoices.some(i=>String(i.projId)===String(projId));
  const msg=hasInvs
    ? `確定刪除「${p.name}」的所有請款紀錄？
請款資料將一併刪除，但專案本身不受影響。`
    : `「${p.name}」目前沒有請款紀錄，確定要從請款日分頁移除此專案嗎？`;
  if(!confirm(msg)) return;
  const toDelete=invoices.filter(i=>String(i.projId)===String(projId));
  const prevInvs=[...invoices];
  invoices=invoices.filter(i=>String(i.projId)!==String(projId));
  renderInvoice();
  let failed=false;
  for(const inv of toDelete){
    const res=await api('deleteInvoice',{id:String(inv.id)});
    if(!res||res.error){ failed=true; }
  }
  if(failed){ invoices=prevInvs; renderInvoice(); showToast('❌ 部分刪除失敗，請重試'); }
  else{ showToast(`✓ 「${p.name}」的請款紀錄已清除`); }
}

async function togglePaid(id){
  const inv=invoices.find(i=>String(i.id)===String(id));if(!inv)return;
  const prev=inv.paid;
  inv.paid=!(String(inv.paid)==='true'||inv.paid===true);
  renderInvoice();
  const res=await api('updateInvoice',{id:String(id),paid:inv.paid});
  if(!res||res.error){
    inv.paid=prev;renderInvoice();showToast('❌ 更新失敗，請重試');
  } else {
    showToast(inv.paid?'✓ 已標記為已請款':'已取消請款');
    if(inv.paid) await checkAndAutoClose(inv.projId);
  }
}

async function deleteInv(id){
  if(!confirm('確定刪除此請款紀錄？'))return;
  const prev=[...invoices];
  invoices=invoices.filter(i=>String(i.id)!==String(id));
  renderInvoice();
  const res=await api('deleteInvoice',{id:String(id)});
  if(!res||res.error){
    invoices=prev;renderInvoice();showToast('❌ 刪除失敗，請重試');
  } else {
    showToast('✓ 請款紀錄已刪除並同步');
  }
}

function openAddRecurring(){
  document.querySelectorAll('.inv-add-form').forEach(f=>f.classList.remove('open'));
  document.getElementById('rec-form').classList.add('open');
}

async function saveRecurring(){
  const projId=document.getElementById('rec-proj').value;
  const dayOfMonth=parseInt(document.getElementById('rec-day').value);
  const amount=document.getElementById('rec-amt').value;
  const note=document.getElementById('rec-note').value;
  if(!projId||!dayOfMonth||!amount){showToast('請填入所有欄位');return;}
  if(dayOfMonth<1||dayOfMonth>28){showToast('請輸入 1~28 號');return;}
  const res=await api('addRecurring',{projId,dayOfMonth,amount:Number(amount),note,active:true});
  if(res&&res.id){
    recurring.push({id:res.id,projId,dayOfMonth,amount:Number(amount),note,active:true});
    // Inject this month and next 3 months into tasks
    await injectRecurringTasks({id:res.id,projId,dayOfMonth,amount:Number(amount),note,active:true});
    document.getElementById('rec-form').classList.remove('open');
    renderInvoice();renderDaily();renderGantt();
    showToast('✓ 固定請款已新增，並同步至待辦與甘特圖');
  }
}

async function injectRecurringTasks(rec){
  const proj=projects.find(p=>String(p.id)===String(rec.projId));
  const label=`[每月請款] ${proj?proj.name:''}${rec.note?' - '+rec.note:''} ${fmt(rec.amount)}`;
  const now=new Date(); now.setHours(0,0,0,0);
  for(let m=0;m<4;m++){
    const d=new Date(now.getFullYear(), now.getMonth()+m, rec.dayOfMonth);
    if(d<now) continue;
    const ds=fmtDate(d);
    const already=tasks.find(t=>t.text===label&&t.date===ds);
    if(already) continue;
    const r=await api('addTask',{text:label,date:ds,projId:rec.projId,done:false,ganttStart:ds,ganttEnd:ds,prog:0});
    if(r&&r.id) tasks.push({id:r.id,text:label,date:ds,projId:rec.projId,done:false,ganttStart:ds,ganttEnd:ds,prog:0});
  }
}

async function deleteRec(id){
  if(!confirm('確定刪除此固定請款？（已產生的待辦不會刪除）'))return;
  const prev=[...recurring];
  recurring=recurring.filter(r=>String(r.id)!==String(id));
  renderInvoice();
  const res=await api('deleteRecurring',{id:String(id)});
  if(!res||res.error){
    recurring=prev;renderInvoice();showToast('❌ 刪除失敗，請重試');
  } else {
    showToast('✓ 固定請款已刪除並同步');
  }
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');document.getElementById('view-'+name).classList.add('active');
  if(name==='gantt')renderGantt();
  if(name==='invoice'){renderInvoice();}
}

// Auto-fill inputs and connect on load
document.addEventListener('DOMContentLoaded', function(){
  const ui=document.getElementById('api-url');
  const ti=document.getElementById('api-token');
  const storedUrl=localStorage.getItem('pm_api_url')||'';
  const storedTok=localStorage.getItem('pm_token')||'';
  // Update globals in case they were read before storage was ready
  if(storedUrl) API_URL=storedUrl;
  if(storedTok) ACCESS_TOKEN=storedTok;
  if(ui) ui.value=API_URL;
  if(ti) ti.value=ACCESS_TOKEN;
  console.log('[init] API_URL='+API_URL.slice(0,30)+'... TOKEN='+ACCESS_TOKEN.slice(0,8)+'...');
  if(API_URL){ syncAll(); } else { renderProjects(); renderDaily(); }
});
</script>
